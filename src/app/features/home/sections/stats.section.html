<ng-container *transloco="let t">
<section #statsSection>
  <div class="container-site">
    <div class="bg-ink text-white rounded-2xl overflow-hidden shadow-[0_12px_40px_-20px_rgba(10,30,80,0.45)] grid grid-cols-1 md:grid-cols-3">
    @for (s of statDefs; track s.labelKey; let i = $index) {
      <div class="px-7 py-11 flex flex-col items-center justify-center text-center gap-3.5 border-b md:border-b-0 md:border-r border-white/10 last:border-b-0 md:last:border-r-0">
        <div class="w-16 h-16 inline-flex items-center justify-center text-accent" aria-hidden="true">
          @if (s.icon === 'img') {
            <span class="block w-16 h-16 bg-accent"
                  [style.-webkit-mask]="'url(' + s.iconSrc + ') center / contain no-repeat'"
                  [style.mask]="'url(' + s.iconSrc + ') center / contain no-repeat'"></span>
          } @else if (s.icon === 'finish') {
            <svg class="w-16 h-14" viewBox="0 0 640 512" fill="currentColor"><path d="M48 0C21.5 0 0 21.5 0 48V464c0 26.5 21.5 48 48 48h96V432c0-26.5 21.5-48 48-48s48 21.5 48 48v80h57.9C261.4 489.4 256 467.4 256 444c0-100 73.4-182.8 169.4-198.1c8.1-1.3 16.4-2 24.9-2.1l-.1-.1c-.2-1.9-.1-3.7-.1-5.6V48C448 21.5 426.5 0 400 0H48zM64 240c0-8.8 7.2-16 16-16H112c8.8 0 16 7.2 16 16v32c0 8.8-7.2 16-16 16H80c-8.8 0-16-7.2-16-16V240zm112-16h32c8.8 0 16 7.2 16 16v32c0 8.8-7.2 16-16 16H176c-8.8 0-16-7.2-16-16V240c0-8.8 7.2-16 16-16zm80 32V240c0-8.8 7.2-16 16-16h32c8.8 0 16 7.2 16 16v32c0 8.8-7.2 16-16 16H272c-8.8 0-16-7.2-16-16zM80 96h32c8.8 0 16 7.2 16 16v32c0 8.8-7.2 16-16 16H80c-8.8 0-16-7.2-16-16V112c0-8.8 7.2-16 16-16zm96 16c0-8.8 7.2-16 16-16h32c8.8 0 16 7.2 16 16v32c0 8.8-7.2 16-16 16H192c-8.8 0-16-7.2-16-16V112zM272 96h32c8.8 0 16 7.2 16 16v32c0 8.8-7.2 16-16 16H272c-8.8 0-16-7.2-16-16V112c0-8.8 7.2-16 16-16zM640 368a144 144 0 1 1 -288 0 144 144 0 1 1 288 0zm-76.7-43.3c-6.2-6.2-16.4-6.2-22.6 0L488 377.4l-28.7-28.7c-6.2-6.2-16.4-6.2-22.6 0s-6.2 16.4 0 22.6l40 40c6.2 6.2 16.4 6.2 22.6 0l64-64c6.2-6.2 6.2-16.4 0-22.6z"/></svg>
          }
        </div>
        <div class="font-display font-bold text-accent tracking-[-0.02em] tabular-nums text-[clamp(2rem,3.2vw,2.6rem)]">{{ statValues()[i] }}</div>
        <div class="mt-2 text-white/70 text-sm">{{ t(s.labelKey) }}</div>
      </div>
    }
    </div>
  </div>
</section>
</ng-container>
