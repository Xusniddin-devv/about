<ng-container *transloco="let t">
<section class="py-24 bg-bg-soft" id="gallery">
  <div class="px-24">
    <div class="flex flex-wrap justify-between items-end gap-6">
      <div class="max-w-[720px]">
        <span class="section-tag">{{ t('gallery.tag') }}</span>
        <h2 class="font-display font-bold text-ink tracking-[-0.02em] leading-[1.15] text-[clamp(1.8rem,3vw,2.5rem)]">{{ t('gallery.title') }}</h2>
      </div>
      <a routerLink="/gallery" class="btn btn-accent">{{ t('gallery.all') }}</a>
    </div>

    <div class="mt-12 grid grid-cols-2 lg:grid-cols-4 gap-4">
      @for (p of photos; track p.src) {
        <figure class="relative group overflow-hidden bg-white border border-line rounded-2xl shadow-[0_8px_24px_-16px_rgba(10,30,80,0.22)]">
          <img [src]="p.src" [alt]="t(p.captionKey)" class="aspect-[4/3] object-cover w-full transition-transform duration-500 group-hover:scale-105" />
          <figcaption class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-ink/85 to-transparent text-white font-display font-medium text-sm px-4 py-3">{{ t(p.captionKey) }}</figcaption>
        </figure>
      }
    </div>
  </div>
</section>
</ng-container>
