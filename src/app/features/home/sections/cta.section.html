<ng-container *transloco="let t">
<section class="bg-ink text-white py-16">
  <div class="container-site grid gap-10 lg:grid-cols-[1.5fr_1fr] items-center">
    <div>
      <div class="font-display text-xs tracking-[0.18em] uppercase text-accent">{{ t('cta.trustLabel') }}</div>
      <h2 class="mt-3 font-display font-bold text-white tracking-[-0.02em] leading-[1.1] text-[clamp(1.8rem,3vw,2.5rem)]">{{ t('cta.title') }}</h2>
      <p class="mt-3 text-white/70 text-[1.05rem] max-w-[640px]">{{ t('cta.sub') }}</p>
    </div>
    <div class="bg-white/5 border border-white/10 p-7 flex flex-col gap-4">
      <a href="tel:+998781505015" class="block font-display font-bold text-accent text-3xl tracking-tight">+998 78 150-50-15</a>
      <div class="grid grid-cols-2 gap-3 text-sm text-white/75">
        <div><span class="text-white/45">{{ t('cta.callsTotal') }}:</span> <strong class="text-white">13488</strong></div>
        <div><span class="text-white/45">{{ t('cta.excellent') }}:</span> <strong class="text-white">2569</strong></div>
        <div><span class="text-white/45">{{ t('cta.good') }}:</span> <strong class="text-white">6231</strong></div>
        <div><span class="text-white/45">{{ t('cta.fair') }}:</span> <strong class="text-white">2445</strong></div>
      </div>
      <a class="btn btn-accent self-start" href="mailto:info&#64;uzbekgidroenergo.uz">{{ t('cta.btn') }}</a>
    </div>
  </div>
</section>
</ng-container>
