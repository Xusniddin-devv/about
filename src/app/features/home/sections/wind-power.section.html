<ng-container *transloco="let t">
<section class="py-24 bg-bg-soft" id="wind">
  <div class="container-site">
    <div class="max-w-[720px]">
      <span class="section-tag">{{ t('wind.tag') }}</span>
      <h2 class="font-display font-bold text-ink tracking-[-0.02em] leading-[1.15] text-[clamp(1.8rem,3vw,2.5rem)]">{{ t('wind.title') }}</h2>
    </div>

    <div class="mt-10 grid grid-cols-1 md:grid-cols-2 gap-6">
      <article class="bg-white border border-line p-8 flex flex-col gap-4">
        <div class="font-display text-xs tracking-[0.18em] uppercase text-accent">{{ t('wind.firstLabel') }}</div>
        <h3 class="font-display font-semibold text-ink text-lg leading-snug">{{ t('wind.firstTitle') }}</h3>
        <p class="text-ink-soft text-[0.98rem] leading-relaxed m-0 flex-1">{{ t('wind.firstText') }}</p>
        <a href="#" class="font-display text-sm font-medium text-primary hover:text-primary-dark">{{ t('wind.more') }} →</a>
      </article>
      <article class="bg-ink text-white p-8 flex flex-col gap-4">
        <div class="font-display text-xs tracking-[0.18em] uppercase text-accent">{{ t('wind.grantLabel') }}</div>
        <h3 class="font-display font-semibold text-white text-lg leading-snug">{{ t('wind.grantTitle') }}</h3>
        <p class="text-white/75 text-[0.98rem] leading-relaxed m-0 flex-1">{{ t('wind.grantText') }}</p>
        <a href="#" class="font-display text-sm font-medium text-accent hover:text-accent-soft">{{ t('wind.more') }} →</a>
      </article>
    </div>
  </div>
</section>
</ng-container>
