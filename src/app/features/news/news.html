<ng-container *transloco="let t">
<section class="py-20">
  <div class="container-site">
    <span class="section-tag">{{ t('nav.news') }}</span>
    <h1 class="font-display font-bold text-ink leading-[1.1] text-[clamp(2rem,4vw,3rem)]">{{ t('nav.news') }}</h1>
    <p class="mt-4 text-ink-soft max-w-[640px]">{{ items.length }} {{ t('news.totalLabel') }}</p>

    <div class="mt-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (n of items; track n.id) {
        <a [routerLink]="['/news', n.id]" class="group bg-white border border-line flex flex-col hover:border-primary transition-colors overflow-hidden">
          <div class="relative aspect-[16/10] overflow-hidden bg-bg-soft">
            <img [src]="n.image" [alt]="n.title" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" />
            <span class="absolute top-3 left-3 bg-ink text-white font-display font-semibold text-[11px] px-2.5 py-1 tracking-[0.08em] uppercase">{{ n.category }}</span>
          </div>
          <div class="p-6 flex flex-col gap-4 flex-1">
            <div class="flex gap-3 text-xs text-muted font-display tracking-[0.08em]">
              <time>{{ n.date }}</time>
              <span>·</span>
              <span>{{ n.views }} {{ t('news.views') }}</span>
            </div>
            <h2 class="font-display font-semibold text-ink leading-snug text-[17px] flex-1">{{ n.title }}</h2>
            <p class="text-ink-soft text-[14px] leading-relaxed line-clamp-2 m-0">{{ n.excerpt }}</p>
            <span class="font-display text-sm font-medium text-primary group-hover:text-primary-dark">{{ t('news.more') }} →</span>
          </div>
        </a>
      }
    </div>
  </div>
</section>
</ng-container>
